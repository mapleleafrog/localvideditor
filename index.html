<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SORANJI-VFX // RETRO PORTAL</title>
    <!-- No web fonts / no network: a monospace stack keeps it fully offline. -->
    <style>
      :root {
        --bg: #0a0118;
        --panel: #150b2e;
        --ink: #e9d5ff;
        --dim: #9a7fce;
        --magenta: #ff2e88;
        --cyan: #00f0ff;
        --yellow: #ffe35a;
        --line: #311b5e;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background:
          radial-gradient(circle at 50% -10%, #2a0a4a 0, var(--bg) 55%),
          var(--bg);
        color: var(--ink);
        font-family: "VT323", ui-monospace, monospace;
        font-size: 18px;
        overflow: hidden;
      }
      /* global CRT scanline + vignette overlay */
      .crt {
        position: fixed; inset: 0; pointer-events: none; z-index: 9999;
        background:
          repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0 1px, transparent 1px 3px),
          radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.55) 100%);
        mix-blend-mode: multiply;
      }
      .pixel { font-family: "Press Start 2P", "VT323", monospace; }
      header {
        padding: 14px 22px; border-bottom: 2px solid var(--line);
        display: flex; align-items: baseline; gap: 16px;
        background: linear-gradient(90deg, rgba(255,46,136,0.12), transparent);
      }
      header h1 {
        font-family: "Press Start 2P", monospace; font-size: 20px; letter-spacing: 1px;
        color: #fff;
        text-shadow: 0 0 6px var(--magenta), 0 0 14px var(--magenta), 3px 3px 0 #5a0030;
      }
      header .sub { color: var(--cyan); font-size: 18px; text-shadow: 0 0 8px var(--cyan); }
      main { display: grid; grid-template-columns: 380px 1fr; height: calc(100% - 58px); }
      /* ---- panel ---- */
      .panel { border-right: 2px solid var(--line); display: flex; flex-direction: column; min-height: 0; background: linear-gradient(180deg, var(--panel), #0c0620); }
      .tabs { display: flex; border-bottom: 2px solid var(--line); }
      .tabs button {
        flex: 1; background: transparent; color: var(--dim); border: 0; cursor: pointer;
        padding: 12px 6px; font-family: "Press Start 2P", monospace; font-size: 10px; letter-spacing: 1px;
        border-bottom: 3px solid transparent;
      }
      .tabs button.on { color: #fff; border-bottom-color: var(--magenta); text-shadow: 0 0 8px var(--magenta); background: rgba(255,46,136,0.08); }
      .scroll { overflow-y: auto; padding: 14px; flex: 1; min-height: 0; }
      .scroll::-webkit-scrollbar { width: 10px; }
      .scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
      .grp { font-family: "Press Start 2P", monospace; font-size: 9px; color: var(--cyan); margin: 16px 0 8px; letter-spacing: 1px; text-shadow: 0 0 6px var(--cyan); }
      .grp:first-child { margin-top: 0; }
      .chips { display: flex; flex-wrap: wrap; gap: 7px; }
      .chip {
        cursor: pointer; user-select: none; padding: 6px 9px; border-radius: 4px;
        border: 1px solid var(--line); background: #1b0f38; color: var(--dim);
        font-size: 15px; line-height: 1.1; transition: transform 0.05s;
      }
      .chip:hover { color: var(--ink); border-color: var(--magenta); }
      .chip:active { transform: scale(0.95); }
      .chip.on { background: var(--magenta); color: #fff; border-color: #fff; box-shadow: 0 0 10px var(--magenta); }
      .chip.bg.on { background: var(--cyan); color: #04222a; box-shadow: 0 0 10px var(--cyan); }
      .chip.tr.on { background: var(--yellow); color: #2a2300; box-shadow: 0 0 10px var(--yellow); }
      .chip .tier { opacity: 0.6; font-size: 11px; }
      .chip .ax { color: var(--yellow); font-size: 11px; }
      .hint { color: var(--dim); font-size: 15px; margin: 4px 0 10px; }
      /* ---- controls dock ---- */
      .dock { border-top: 2px solid var(--line); padding: 12px 14px; background: #0c0620; }
      .active { display: flex; flex-wrap: wrap; gap: 6px; min-height: 26px; margin-bottom: 10px; }
      .active .t { background: #2a1652; border: 1px solid var(--magenta); color: #fff; padding: 3px 7px; border-radius: 4px; font-size: 14px; }
      .active .empty { color: var(--dim); font-size: 14px; }
      .row { display: flex; align-items: center; gap: 8px; margin: 7px 0; font-size: 16px; }
      .row label { color: var(--dim); width: 64px; }
      .row input[type="range"] { flex: 1; accent-color: var(--magenta); }
      .row .val { width: 48px; text-align: right; color: var(--cyan); }
      .btns { display: flex; gap: 8px; margin-top: 6px; }
      .btns button {
        flex: 1; cursor: pointer; background: #1b0f38; color: var(--ink); border: 1px solid var(--line);
        padding: 8px; border-radius: 4px; font-family: "Press Start 2P", monospace; font-size: 9px;
      }
      .btns button:hover { border-color: var(--cyan); color: #fff; }
      /* ---- stage ---- */
      .stage-wrap { position: relative; display: flex; align-items: center; justify-content: center; padding: 28px; min-height: 0; }
      .stage {
        position: relative; width: 100%; max-width: 980px; aspect-ratio: 16 / 9;
        border: 2px solid var(--line); border-radius: 6px; overflow: hidden;
        background: #05010f; box-shadow: 0 0 40px rgba(255,46,136,0.18), inset 0 0 60px rgba(0,0,0,0.6);
      }
      .layer { position: absolute; inset: 0; }
      #bg { z-index: 0; }
      #sprite-wrap { z-index: 1; }
      #overlay { z-index: 2; pointer-events: none; }
      #sprite {
        position: absolute; left: 50%; top: 56%; width: 190px; height: 190px;
        transform: translate(-50%, -50%); image-rendering: pixelated;
        filter: drop-shadow(0 12px 16px rgba(0,0,0,0.45));
      }
      .scene { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
      .scene .lab { font-family: "Press Start 2P", monospace; font-size: 64px; color: rgba(255,255,255,0.85); text-shadow: 0 4px 0 rgba(0,0,0,0.4); }
      #sceneA { background: linear-gradient(135deg, #ff9a52, #7a3b6e); z-index: 1; }
      #sceneB { background: linear-gradient(135deg, #1b2a6b, #0e3b4d); z-index: 2; }
      .badge {
        position: absolute; left: 14px; top: 12px; z-index: 5; font-family: "Press Start 2P", monospace;
        font-size: 11px; color: #fff; background: rgba(10,1,24,0.7); border: 1px solid var(--line);
        padding: 7px 10px; border-radius: 4px; text-shadow: 0 0 6px var(--magenta); max-width: 70%;
      }
      .badge .stack { color: var(--cyan); font-size: 10px; }
      .help { position: absolute; right: 14px; bottom: 12px; z-index: 5; color: var(--dim); font-size: 14px; text-align: right; }
      footer { display: none; }
    </style>
  </head>
  <body>
    <div class="crt"></div>
    <header>
      <h1>SORANJI-VFX</h1>
      <span class="sub">// RETRO FX PORTAL</span>
      <span style="margin-left:auto;color:var(--dim);font-size:15px" id="count"></span>
    </header>
    <main>
      <div class="panel">
        <div class="tabs">
          <button data-tab="motions" class="on">MOTIONS</button>
          <button data-tab="background">BACKDROP</button>
          <button data-tab="transitions">TRANSITIONS</button>
        </div>
        <div class="scroll" id="list"></div>
        <div class="dock">
          <div class="active" id="active"></div>
          <div class="row"><label>Speed</label><input id="speed" type="range" min="0.25" max="3" step="0.05" value="1" /><span class="val" id="speedV">1.0x</span></div>
          <div class="row"><label>BPM</label><input id="bpm" type="range" min="60" max="180" step="1" value="120" /><span class="val" id="bpmV">120</span></div>
          <div class="row"><label>Window</label><input id="win" type="range" min="0.4" max="4" step="0.1" value="1.4" /><span class="val" id="winV">1.4s</span></div>
          <div class="btns">
            <button id="play">⏸ PAUSE</button>
            <button id="replay">⟲ REPLAY</button>
            <button id="clear">✕ CLEAR</button>
          </div>
        </div>
      </div>
      <div class="stage-wrap">
        <div class="stage" id="stage">
          <div class="layer" id="bg"></div>
          <div class="layer" id="sprite-wrap"><img id="sprite" alt="sprite" /></div>
          <div class="layer" id="overlay"></div>
          <div class="layer scene" id="sceneA" style="display:none"><span class="lab">A</span></div>
          <div class="layer scene" id="sceneB" style="display:none"><span class="lab">B</span></div>
          <div class="badge" id="badge"></div>
          <div class="help" id="help"></div>
        </div>
      </div>
    </main>

        dipToColor: tr("Dip to Black", "Dissolve", (p) => ({ opacity: clamp(p * 2 - 1) }), (p) => ({ opacity: clamp(1 - p * 2) }), (p) => ({ background: "#000", opacity: 1 - Math.abs(2 * p - 1) })),
        flashWhite: tr("Flash White", "Light", (p) => ({ opacity: clamp(p * 2 - 1) }), (p) => ({ opacity: clamp(1 - p * 2) }), (p) => ({ background: "#fff", opacity: Math.pow(1 - Math.abs(2 * p - 1), 1.6) })),
        lightLeak: tr("Light Leak", "Light", (p) => ({ opacity: p }), (p) => ({ opacity: 1 - p }), (p) => ({ backgroundImage: "linear-gradient(115deg, transparent 20%, rgba(255,190,120,0.85) 45%, rgba(255,120,160,0.65) 55%, transparent 80%)", backgroundSize: "260% 100%", backgroundPosition: `${lerp(-80, 180, p)}% 0`, mixBlendMode: "screen", opacity: Math.sin(p * Math.PI) * 0.95 })),
        slidePush: tr("Slide Push", "Slide", (p) => ({ transform: `translateX(${(1 - p) * 100}%)` }), (p) => ({ transform: `translateX(${-p * 100}%)` })),
        slideOver: tr("Slide Over", "Slide", (p) => ({ transform: `translateY(${(1 - p) * 100}%)` })),
        coverUncover: tr("Cover/Uncover", "Slide", (p) => ({ transform: `translateX(${(1 - p) * 100}%)` })),
        linearWipe: tr("Linear Wipe", "Wipe", (p) => ({ clipPath: `inset(0 ${(1 - p) * 100}% 0 0)` })),
        clockWipe: tr("Clock Wipe", "Wipe", (p) => { const g = `conic-gradient(from -90deg, #000 ${p * 360}deg, transparent 0)`; return { maskImage: g, WebkitMaskImage: g }; }),
        barnDoor: tr("Barn Door", "Wipe", (p) => ({ clipPath: `inset(0 ${(1 - p) * 50}% 0 ${(1 - p) * 50}%)` })),
        windowBlinds: tr("Window Blinds", "Wipe", (p) => { const g = `repeating-linear-gradient(180deg, #000 0, #000 ${p * 40}px, transparent ${p * 40}px, transparent 40px)`; return { maskImage: g, WebkitMaskImage: g }; }),
        irisCircle: tr("Iris Circle", "Shape", (p) => ({ clipPath: `circle(${p * 75}% at 50% 50%)` })),
        circleCrop: tr("Circle Crop", "Shape", (p) => ({ clipPath: `circle(${p * 75}% at 50% 50%)` })),
        rectangleCrop: tr("Rectangle Crop", "Shape", (p) => ({ clipPath: `inset(${(1 - p) * 50}% ${(1 - p) * 50}%)` })),
        heart: tr("Heart", "Shape", (p) => fullMask(HEART, `${p * 200}%`)),
        starWipe: tr("Star Wipe", "Shape", (p) => ({ clipPath: starPoly(clamp(p)) })),
        doorway: tr("Doorway", "Shape", (p) => ({ clipPath: `inset(0 ${(1 - p) * 50}% 0 ${(1 - p) * 50}%)` }), (p) => ({ filter: `brightness(${1 - p * 0.7})`, transform: `scale(${1 + p * 0.1})` })),
        svgMaskReveal: tr("Diagonal Reveal", "Shape", (p) => ({ clipPath: `polygon(0 0, ${p * 150}% 0, ${p * 150 - 50}% 100%, 0% 100%)` })),
        flip3D: tr("Flip 3D", "3D", (p) => ({ transform: `perspective(1200px) rotateY(${-90 + p * 90}deg)`, opacity: p > 0.5 ? 1 : 0 }), (p) => ({ transform: `perspective(1200px) rotateY(${p * 90}deg)`, opacity: p < 0.5 ? 1 : 0 })),
        bookFlip: tr("Book Flip", "3D", (p) => ({ transform: `perspective(1500px) rotateY(${90 - p * 90}deg)`, transformOrigin: "left", opacity: p > 0.5 ? 1 : 0 }), (p) => ({ transform: `perspective(1500px) rotateY(${-p * 90}deg)`, transformOrigin: "left", opacity: p < 0.5 ? 1 : 0 }), null, true),
        zoomBlur: tr("Zoom Blur", "Zoom", (p) => ({ opacity: p, transform: `scale(${lerp(1.3, 1, p)})`, filter: `blur(${(1 - p) * 14}px)` }), (p) => ({ transform: `scale(${lerp(1, 0.85, p)})`, filter: `blur(${p * 14}px)` })),
        zoomInOut: tr("Zoom In/Out", "Zoom", (p) => ({ opacity: clamp(p * 1.5), transform: `scale(${lerp(0.7, 1, p)})` }), (p) => ({ transform: `scale(${lerp(1, 1.4, p)})` })),
        simpleZoom: tr("Simple Zoom", "Zoom", (p) => ({ opacity: clamp(p * 1.5), transform: `scale(${lerp(0.8, 1, p)})` })),
        crossZoom: tr("Cross Zoom", "Zoom", (p) => ({ opacity: p, transform: `scale(${lerp(1.6, 1, p)})`, filter: `blur(${(1 - p) * 18}px)` }), (p) => ({ transform: `scale(${1 + p * 0.6})`, filter: `blur(${p * 18}px)`, opacity: 1 - p }), null, true),
        linearBlur: tr("Linear Blur", "Zoom", (p) => ({ opacity: p, filter: `blur(${(1 - p) * 16}px)` }), (p) => ({ filter: `blur(${p * 16}px)`, opacity: 1 - p }), null, true),
        whipPan: tr("Whip Pan", "Zoom", (p) => ({ transform: `translateX(${(1 - p) * 120}%)`, filter: `blur(${Math.sin(p * Math.PI) * 12}px)` }), (p) => ({ transform: `translateX(${-p * 120}%)`, filter: `blur(${Math.sin(p * Math.PI) * 12}px)` })),
        dreamyZoom: tr("Dreamy Zoom", "Light", (p) => ({ opacity: p, transform: `scale(${lerp(1.25, 1, p)}) rotate(${(1 - p) * 3}deg)`, filter: `blur(${(1 - p) * 10}px) brightness(${lerp(1.6, 1, p)})` }), (p) => ({ transform: `scale(${lerp(1, 1.15, p)})`, filter: `blur(${p * 8}px) brightness(${lerp(1, 1.6, p)})` })),
        filmBurn: tr("Film Burn", "Light", (p) => ({ opacity: p }), (p) => ({ opacity: 1 - p, filter: `brightness(${1 + p}) sepia(${p})` }), (p) => ({ background: "radial-gradient(circle, rgba(255,150,0,0.9), rgba(120,20,0,0.5))", mixBlendMode: "screen", opacity: Math.sin(p * Math.PI) }), true),
        crossWarp: tr("Cross Warp", "Warp", (p) => ({ opacity: p, filter: `blur(${(1 - p) * 6}px)`, transform: `skewX(${-(1 - p) * 6}deg)` }), (p) => ({ opacity: 1 - p, filter: `blur(${p * 6}px)`, transform: `scale(${1 + p * 0.1}) skewX(${p * 6}deg)` }), null, true),
        ripple: tr("Ripple", "Warp", (p) => ({ opacity: clamp(p * 1.5), filter: `blur(${(1 - p) * 3}px)`, transform: `scale(${lerp(1.1, 1, p)})` }), null, null, true),
        rgbSplit: tr("RGB Split", "Glitch", (p) => { const o = Math.sin(p * Math.PI) * 12; return { opacity: p, filter: `drop-shadow(${o}px 0 0 rgba(255,0,0,0.6)) drop-shadow(${-o}px 0 0 rgba(0,255,255,0.6))` }; }, (p) => { const o = Math.sin(p * Math.PI) * 12; return { filter: `drop-shadow(${o}px 0 0 rgba(255,0,0,0.6)) drop-shadow(${-o}px 0 0 rgba(0,255,255,0.6))` }; }),
        pixelize: tr("Pixelize", "Pixel", (p) => ({ opacity: clamp(p * 1.4), filter: `blur(${(1 - p) * 9}px) contrast(1.1)`, imageRendering: "pixelated" }), (p) => ({ filter: `blur(${p * 9}px) contrast(1.1)` })),
        randomSquares: tr("Random Squares", "Pixel", (p) => tileMask(squaresURI(clamp(p)), "64px 64px")),
        mosaicShatter: tr("Mosaic Shatter", "Pixel", (p) => ({ opacity: clamp(p * 1.5), transform: `scale(${lerp(1.15, 1, p)}) rotate(${(1 - p) * 4}deg)` }), (p) => ({ transform: `scale(${lerp(1, 0.9, p)}) rotate(${-p * 4}deg)`, filter: `blur(${p * 4}px)` })),
        doomScreen: tr("Doom Melt", "Pixel", (p) => fullMask(doomURI(clamp(p)), "100% 100%")),
        crtOn: tr("CRT Power-on", "Retro", (p) => { const a = clamp(p / 0.4), b = clamp((p - 0.4) / 0.6); return { transform: `scaleX(${0.2 + a * 0.8}) scaleY(${0.02 + b * 0.98})`, filter: `brightness(${1 + (1 - b) * 2})`, transformOrigin: "center" }; }),
        glitchCut: tr("Glitch Cut", "Retro", (p) => { const j = 1 - clamp(p * 1.4); return { opacity: clamp(p * 1.6), transform: `translateX(${Math.sin(p * 80) * 22 * j}px) skewX(${Math.sin(p * 50) * 6 * j}deg)`, filter: `hue-rotate(${Math.sin(p * 60) * 160 * j}deg) saturate(${1 + 2 * j}) contrast(${1 + j})` }; }),
        pixelDither: tr("Bayer Dither", "Retro", (p) => tileMask(ditherURI(clamp(p)), "8px 8px")),
        scanlineWipe: tr("Scanline Sweep", "Retro", (p) => { const e = p * 102; const g = `linear-gradient(180deg, #000 ${Math.max(0, e - 2)}%, transparent ${e}%)`; return { maskImage: g, WebkitMaskImage: g }; }),
        vhsRewind: tr("VHS Rewind", "Retro", (p) => ({ opacity: clamp(p * 1.5), filter: `blur(${(1 - p) * 2.5}px) saturate(1.6) contrast(1.1)`, transform: `translateX(${(1 - p) * -34}px) skewX(${(1 - p) * 8}deg)` })),
      };

      // ===== compose: stack multiple motion styles =====
      const RESET = ["transform", "filter", "opacity", "clipPath", "webkitClipPath", "maskImage", "webkitMaskImage", "maskSize", "webkitMaskSize", "maskRepeat", "webkitMaskRepeat", "maskPosition", "webkitMaskPosition", "backgroundImage", "backgroundColor", "backgroundPosition", "backgroundSize", "boxShadow", "mixBlendMode", "transformOrigin", "left", "top"];
      function composeStyles(list) {
        const out = {}; const tf = []; const fl = []; let op = 1; let hasOp = false;
        for (const s of list) for (const k in s) {
          const v = s[k];
          if (k === "transform") tf.push(v);
          else if (k === "filter") { if (v && v !== "none") fl.push(v); }
          else if (k === "opacity") { op *= v; hasOp = true; }
          else out[k] = v;
        }
        if (tf.length) out.transform = tf.join(" ");
        if (fl.length) out.filter = fl.join(" ");
        if (hasOp) out.opacity = op;
        return out;
      }
      function applyStyle(el, style, baseTransform) {
        for (const p of RESET) el.style[p] = "";
        const s = Object.assign({}, style);
        if (baseTransform) s.transform = `${baseTransform} ${s.transform || ""}`.trim();
        for (const k in s) {
          const css = k.replace(/[A-Z]/g, (c) => "-" + c.toLowerCase()).replace(/^webkit-/, "-webkit-");
          el.style.setProperty(css, String(s[k]));
        }
      }

      // ===== state =====
      const state = { tab: "motions", motions: new Set(["floatLoop"]), bg: "synthGrid", trans: "crtOn", playing: true, speed: 1, bpm: 120, win: 1.4, playAll: false };
      const FPS = 30;
      let clock = 0, last = 0;
      const $ = (id) => document.getElementById(id);
      // Sprite loads from the sibling public/ folder — works on file:// (double-click)
      // and via any static server. SPRITE (inlined base64) is kept as an offline fallback.
      const sprite = $("sprite");
      sprite.src = "public/orange-mush.gif";
      sprite.onerror = () => { sprite.onerror = null; sprite.src = SPRITE; };

      const byCat = (filterFn) => { const g = {}; for (const id in MOTIONS) { const e = MOTIONS[id]; if (!filterFn(e)) continue; (g[e.cat] = g[e.cat] || []).push([id, e]); } return g; };
      const trByCat = () => { const g = {}; for (const id in TRANSITIONS) { const e = TRANSITIONS[id]; (g[e.cat] = g[e.cat] || []).push([id, e]); } return g; };

      function renderList() {
        const host = $("list"); host.innerHTML = "";
        if (state.tab === "motions") {
          host.insertAdjacentHTML("beforeend", `<div class="hint">Tick several — they STACK on the sprite in real time. ★ overlay effects sit on top.</div>`);
          const groups = byCat((e) => e.layer !== "bg");
          for (const cat in groups) {
            host.insertAdjacentHTML("beforeend", `<div class="grp">${cat}</div>`);
            const wrap = document.createElement("div"); wrap.className = "chips";
            for (const [id, e] of groups[cat]) {
              const c = document.createElement("div");
              c.className = "chip" + (state.motions.has(id) ? " on" : "");
              c.innerHTML = `${e.name}${e.layer === "overlay" ? " ★" : ""} <span class="tier">${e.tier}</span>`;
              c.onclick = () => { state.motions.has(id) ? state.motions.delete(id) : state.motions.add(id); renderList(); renderActive(); };
              wrap.appendChild(c);
            }
            host.appendChild(wrap);
          }
        } else if (state.tab === "background") {
          host.insertAdjacentHTML("beforeend", `<div class="hint">Pick one backdrop behind the sprite.</div><div class="grp">Backgrounds</div>`);
          const wrap = document.createElement("div"); wrap.className = "chips";
          [["none", "None"]].concat(Object.entries(MOTIONS).filter(([, e]) => e.layer === "bg").map(([id, e]) => [id, e.name])).forEach(([id, name]) => {
            const c = document.createElement("div"); c.className = "chip bg" + (state.bg === id ? " on" : ""); c.textContent = name;
            c.onclick = () => { state.bg = id; renderList(); }; wrap.appendChild(c);
          });
          host.appendChild(wrap);
        } else {
          host.insertAdjacentHTML("beforeend", `<div class="hint">Pick a transition — clips A↔B loop it. ⚡ = CSS approximation of a shader effect.</div>`);
          const groups = trByCat();
          for (const cat in groups) {
            host.insertAdjacentHTML("beforeend", `<div class="grp">${cat}</div>`);
            const wrap = document.createElement("div"); wrap.className = "chips";
            for (const [id, e] of groups[cat]) {
              const c = document.createElement("div"); c.className = "chip tr" + (state.trans === id && !state.playAll ? " on" : "");
              c.innerHTML = `${e.name}${e.approx ? ' <span class="ax">⚡</span>' : ""}`;
              c.onclick = () => { state.trans = id; state.playAll = false; clock = 0; renderList(); }; wrap.appendChild(c);
            }
            host.appendChild(wrap);
          }
        }
      }
      function renderActive() {
        const host = $("active");
        if (state.tab !== "motions") { host.innerHTML = `<span class="empty">${state.tab === "transitions" ? (state.playAll ? "▶ playing all transitions" : "1 transition selected") : "backdrop: " + state.bg}</span>`; return; }
        const arr = [...state.motions];
        host.innerHTML = arr.length ? arr.map((id) => `<span class="t">${MOTIONS[id].name}</span>`).join("") : `<span class="empty">no motions — tick some chips →</span>`;
      }

      // ===== render loop =====
      function frame(now) {
        if (!last) last = now;
        const dt = (now - last) / 1000; last = now;
        if (state.playing) clock += dt * state.speed;
        const t = clock, fr = Math.floor(t * FPS), winSec = state.win;
        const ctx = { progress: clamp((t % winSec) / winSec), frame: fr, fps: FPS, t, beat: beatKick(t, state.bpm), z: 0.4, params: { speed: 1, radius: 30, angle: 8, z: 0.6 } };

        const transMode = state.tab === "transitions";
        $("sceneA").style.display = transMode ? "" : "none";
        $("sceneB").style.display = transMode ? "" : "none";
        $("sprite-wrap").style.display = transMode ? "none" : "";
        $("bg").style.display = transMode ? "none" : "";

        if (!transMode) {
          // background
          const bgEl = $("bg");
          if (state.bg !== "none" && MOTIONS[state.bg]) applyStyle(bgEl, MOTIONS[state.bg].fn(ctx)); else { for (const p of RESET) bgEl.style[p] = ""; bgEl.style.background = "transparent"; }
          // sprite stack (sprite-layer motions) + overlay stack (overlay-layer)
          const spriteList = [], overlayList = [];
          for (const id of state.motions) { const e = MOTIONS[id]; (e.layer === "overlay" ? overlayList : spriteList).push(e.fn(ctx)); }
          applyStyle($("sprite"), composeStyles(spriteList), "translate(-50%, -50%)");
          const ov = $("overlay"); if (overlayList.length) applyStyle(ov, composeStyles(overlayList)); else { for (const p of RESET) ov.style[p] = ""; ov.style.background = "transparent"; }
          $("badge").innerHTML = `MOTIONS<br><span class="stack">${state.motions.size} stacked${state.bg !== "none" ? " · bg:" + state.bg : ""}</span>`;
          $("help").textContent = "stack effects ← left panel";
        } else {
          const dur = 1.6; // seconds per transition cycle (at 1x)
          const k = Math.floor(t / dur); const p = clamp((t / dur) % 1);
          const id = state.playAll ? Object.keys(TRANSITIONS)[k % Object.keys(TRANSITIONS).length] : state.trans;
          const T = TRANSITIONS[id] || TRANSITIONS.crossfade;
          const exiting = k % 2 === 0 ? $("sceneA") : $("sceneB");
          const entering = k % 2 === 0 ? $("sceneB") : $("sceneA");
          exiting.style.zIndex = 1; entering.style.zIndex = 2;
          exiting.querySelector(".lab").textContent = String(k);
          entering.querySelector(".lab").textContent = String(k + 1);
          applyStyle(exiting, T.a(p)); applyStyle(entering, T.b(p));
          const ov = $("overlay");
          if (T.o) { applyStyle(ov, T.o(p)); ov.style.zIndex = 3; } else { for (const pp of RESET) ov.style[pp] = ""; ov.style.background = "transparent"; }
          $("badge").innerHTML = `${T.name}${T.approx ? " ⚡" : ""}<br><span class="stack">${state.playAll ? "playing all" : "A → B loop"}</span>`;
          $("help").textContent = "pick a transition ← left panel";
        }
        requestAnimationFrame(frame);
      }

      // ===== wiring =====
      document.querySelectorAll(".tabs button").forEach((b) => (b.onclick = () => {
        document.querySelectorAll(".tabs button").forEach((x) => x.classList.remove("on"));
        b.classList.add("on"); state.tab = b.dataset.tab; clock = 0; renderList(); renderActive();
      }));
      $("speed").oninput = (e) => { state.speed = +e.target.value; $("speedV").textContent = state.speed.toFixed(2) + "x"; };
      $("bpm").oninput = (e) => { state.bpm = +e.target.value; $("bpmV").textContent = state.bpm; };
      $("win").oninput = (e) => { state.win = +e.target.value; $("winV").textContent = state.win.toFixed(1) + "s"; };
      $("play").onclick = () => { state.playing = !state.playing; $("play").textContent = state.playing ? "⏸ PAUSE" : "▶ PLAY"; };
      $("replay").onclick = () => { clock = 0; };
      $("clear").onclick = () => { if (state.tab === "transitions") { state.playAll = true; } else { state.motions.clear(); } renderList(); renderActive(); };
      $("count").textContent = `${Object.keys(MOTIONS).length} motions · ${Object.keys(TRANSITIONS).length} transitions`;

      renderList(); renderActive(); requestAnimationFrame(frame);
    </script>
  </body>
</html>
